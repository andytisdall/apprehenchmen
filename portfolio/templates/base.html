<!doctype html>

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta
      name="description"
      content="Homepage for the band Apprehenchmen in Oakland, CA"
    />
    <meta property="og:image" content="{% static 'normcorecover.jpg' %}" />

    <meta property="og:title" content="Apprehenchmen" />

    <meta property="og:image:width" content="1200" />

    <meta property="og:image:height" content="630" />

    <!-- Bootstrap core CSS -->

    <style>
      .bd-placeholder-img {
        font-size: 1.125rem;
        text-anchor: middle;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
      }

      @media (min-width: 768px) {
        .bd-placeholder-img-lg {
          font-size: 3.5rem;
        }
      }

      .main-header {
        margin-left: 0.5rem;
        font-size: 1.8rem;
      }

      @media (max-width: 500px) {
        .main-header {
          font-size: 1rem;
        }
      }

      .home-container {
        display: flex;
        justify-content: center;
        height: 100vh;
      }
      .home-list {
        width: 100%;
        max-width: 500px;
      }
      .home-item-title {
        color: pink;
        font-weight: 600;
        font-style: normal;
      }
      .home-item {
        font-style: italic;
        color: white;
        display: block;
        width: 100%;
        text-align: center;
        background-color: rgb(65, 65, 65);
        padding: 0.4rem 0.6rem;
        border-radius: 10px;
        margin: 1rem 0;
        font-size: 18px;
      }
    </style>
    <!-- Custom styles for this template -->
  </head>
  <body>
    <nav class="navbar navbar-expand-md navbar-dark bg-dark">
      <a class="navbar-brand" href="{% url 'home' %}">

        <span class="main-header">Apprehenchmen</span>
      </a>

        class="navbar-toggler"
        type="button"
        data-toggle="collapse"
        data-target="#navbarsExample01"
        aria-controls="navbarsExample01"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div
        class="collapse navbar-collapse justify-content-end"
        id="navbarsExample01"
      >
        <ul class="navbar-nav">

            <a class="nav-link" href="{% url 'home' %}"

          </li>
          <li class="nav-item active">
            <a class="nav-link" href="{% url 'lyrics' %}"
              >Lyrics <span class="sr-only">(current)</span></a
            >
          </li>
          <li class="nav-item active">
            <a class="nav-link" href="{% url 'shows' %}"
              >Shows <span class="sr-only">(current)</span></a
            >
          </li>
          <li class="nav-item active">
            <a class="nav-link" href="{% url 'photos' %}"
              >Video/Photo <span class="sr-only">(current)</span></a
            >
          </li>
          <li class="nav-item active">
            <a class="nav-link" href="{% url 'about' %}"
              >About <span class="sr-only">(current)</span></a
            >
          </li>
          <li class="ml-2 mt-1">
            <a href="http://instagram.com/apprehenchmen" target="_blank">
              <img src="{% static 'insta.png' %}" width="25px" />
            </a>
          </li>
        </ul>
      </div>
    </nav>
    <section class="bg-light p-5">{%block content%}{% endblock %}</section>
